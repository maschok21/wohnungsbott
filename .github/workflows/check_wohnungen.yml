name: Wohnungsbot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Bot ausfuehren
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python wohnungsbot.py

      - name: seen_ads.json committen
        run: |
          git config user.name "wohnungsbot"
          git config user.email "wohnungsbot@users.noreply.github.com"
          git add seen_ads.json
          git diff --staged --quiet || git commit -m "update seen_ads.json"
          git push
